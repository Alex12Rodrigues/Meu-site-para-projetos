<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>Alex | Portfólio e Projetos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script>
    (function () {
      const THEME_KEY = "alex_site_theme";
      const LEGACY_THEME_KEYS = ["alex_presentation_theme", "winston_theme"];

      function readSavedTheme() {
        const shared = localStorage.getItem(THEME_KEY);
        if (shared === "light" || shared === "dark") {
          return shared;
        }

        for (const legacyKey of LEGACY_THEME_KEYS) {
          const legacy = localStorage.getItem(legacyKey);
          if (legacy === "light" || legacy === "dark") {
            return legacy;
          }
        }

        return "dark";
      }

      function persistTheme(theme) {
        localStorage.setItem(THEME_KEY, theme);
        LEGACY_THEME_KEYS.forEach((key) => localStorage.setItem(key, theme));
      }

      function applyTheme(theme) {
        const isLight = theme === "light";
        document.body.classList.toggle("light-theme", isLight);
        const icon = document.getElementById("themeIcon");
        if (icon) {
          icon.textContent = isLight ? "🌙" : "☀️";
        }
      }

      window.addEventListener("DOMContentLoaded", function () {
        const toggle = document.getElementById("themeToggle");
        let currentTheme = readSavedTheme();
        applyTheme(currentTheme);
        persistTheme(currentTheme);

        if (!toggle) {
          return;
        }

        toggle.addEventListener("click", function () {
          currentTheme = currentTheme === "dark" ? "light" : "dark";
          applyTheme(currentTheme);
          persistTheme(currentTheme);
        });
      });
    })();
  </script>
  <style>
    :root {
      color-scheme: light dark;
      --bg-1: #0b1020;
      --bg-2: #121a33;
      --card-1: rgba(21, 30, 54, 0.96);
      --card-2: rgba(13, 18, 33, 0.96);
      --paper-2: rgba(255, 255, 255, 0.06);
      --ink: #eef4ff;
      --muted: #b7c1d8;
      --accent: #ff9b42;
      --accent-2: #35d0ff;
      --title-blue: #57a8ff;
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    body.light-theme {
      --bg-1: #e8f2ff;
      --bg-2: #fdf2e4;
      --card-1: rgba(255, 255, 255, 0.98);
      --card-2: rgba(241, 248, 255, 0.98);
      --paper-2: rgba(16, 30, 58, 0.04);
      --ink: #0e1a35;
      --muted: #364764;
      --accent: #ff8e3d;
      --accent-2: #0a7ab4;
      --title-blue: #1f6fd1;
      --line: rgba(14, 26, 53, 0.14);
      --shadow: 0 24px 62px rgba(17, 45, 84, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(53, 208, 255, 0.18), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255, 155, 66, 0.22), transparent 24%),
        linear-gradient(155deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    body.light-theme {
      background:
        radial-gradient(circle at 10% 10%, rgba(74, 160, 255, 0.22), transparent 34%),
        radial-gradient(circle at 88% 14%, rgba(255, 166, 92, 0.2), transparent 30%),
        linear-gradient(150deg, var(--bg-1), var(--bg-2));
    }

    .page {
      min-height: calc(100vh - 48px);
      display: grid;
      place-items: center;
    }

    .hero-card {
      width: min(980px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, var(--card-1), var(--card-2));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-size: 1.1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    body.light-theme .theme-toggle {
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 20px rgba(15, 41, 78, 0.16);
    }

    .theme-toggle:hover {
      transform: translateY(-1px) scale(1.04);
      border-color: var(--accent-2);
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(53, 208, 255, 0.14), transparent 22%),
        radial-gradient(circle at 82% 12%, rgba(255, 155, 66, 0.18), transparent 20%),
        radial-gradient(circle at 78% 82%, rgba(255, 255, 255, 0.05), transparent 26%);
      pointer-events: none;
    }

    body.light-theme .hero-card::before {
      background:
        radial-gradient(circle at 16% 18%, rgba(75, 157, 255, 0.16), transparent 26%),
        radial-gradient(circle at 84% 14%, rgba(255, 173, 104, 0.18), transparent 24%),
        radial-gradient(circle at 72% 80%, rgba(255, 255, 255, 0.55), transparent 28%);
    }

    .hero-content {
      position: relative;
      padding: clamp(28px, 4vw, 56px);
      display: grid;
      gap: 28px;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.78rem;
      color: var(--accent-2);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
      max-width: 11ch;
    }

    .welcome-animated {
      color: var(--title-blue);
      text-shadow: 0 6px 20px rgba(53, 208, 255, 0.2);
    }

    .lead {
      margin: 18px 0 0;
      max-width: 60ch;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      color: #101726;
      background: linear-gradient(120deg, #ffb25f, #ff8f3d);
      box-shadow: 0 12px 28px rgba(255, 143, 61, 0.28);
    }

    .welcome-panel {
      display: grid;
      gap: 0;
      justify-items: center;
    }

    .bot {
      width: 170px;
      height: 186px;
      position: relative;
      animation: botFloat 3.2s ease-in-out infinite;
    }

    .bot-antenna {
      width: 4px;
      height: 24px;
      background: #7bdfff;
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(123, 223, 255, 0.5);
    }

    .bot-antenna::after {
      content: "";
      position: absolute;
      top: -8px;
      left: 50%;
      width: 14px;
      height: 14px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #ffb25f;
      box-shadow: 0 0 14px rgba(255, 178, 95, 0.6);
    }

    .bot-head {
      position: absolute;
      top: 26px;
      left: 50%;
      width: 118px;
      height: 88px;
      transform: translateX(-50%);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(23, 34, 61, 0.95), rgba(13, 19, 34, 0.95));
      border: 1px solid rgba(123, 223, 255, 0.35);
      box-shadow: inset 0 0 18px rgba(53, 208, 255, 0.12);
    }

    .bot-eyes {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
    }

    .bot-eye {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #7bdfff;
      box-shadow: 0 0 10px rgba(123, 223, 255, 0.7);
      animation: botBlink 4s infinite;
    }

    .bot-mouth {
      position: absolute;
      bottom: 16px;
      left: 50%;
      width: 42px;
      height: 8px;
      transform: translateX(-50%);
      border-radius: 8px;
      background: rgba(123, 223, 255, 0.35);
    }

    .bot-body {
      position: absolute;
      top: 122px;
      left: 50%;
      width: 96px;
      height: 52px;
      transform: translateX(-50%);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 178, 95, 0.92), rgba(255, 143, 61, 0.92));
      box-shadow: 0 10px 24px rgba(255, 143, 61, 0.25);
    }

    .bot-arm {
      position: absolute;
      top: 130px;
      width: 14px;
      height: 44px;
      border-radius: 999px;
      background: rgba(123, 223, 255, 0.65);
      transform-origin: top center;
    }

    .bot-arm.left {
      left: 18px;
    }

    .bot-arm.right {
      right: 18px;
      animation: botWave 1.4s ease-in-out infinite;
    }

    @keyframes botFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes botBlink {
      0%,
      46%,
      52%,
      100% {
        transform: scaleY(1);
      }
      49% {
        transform: scaleY(0.15);
      }
    }

    @keyframes botWave {
      0%,
      100% {
        transform: rotate(0deg);
      }
      50% {
        transform: rotate(-26deg);
      }
    }

    .footer-note {
      position: relative;
      padding: 0 clamp(28px, 4vw, 56px) 28px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: left;
    }

    .footer-note strong {
      color: var(--ink);
    }

    .footer-links {
      margin: 0 0 10px;
      display: flex;
      justify-content: flex-start;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 820px) {
      .hero-content {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .page {
        min-height: auto;
      }

      .hero-card {
        border-radius: 20px;
      }

      .hero-content {
        padding: 64px 22px 22px;
        gap: 20px;
      }

      h1 {
        font-size: clamp(2rem, 12vw, 3rem);
        line-height: 1.05;
      }

      .lead {
        font-size: 1rem;
      }

      .actions {
        gap: 10px;
      }

      .button {
        width: 100%;
      }

      .footer-links {
        gap: 8px;
      }

      .footer-note {
        padding: 0 20px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero-card" aria-labelledby="hero-title">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema claro e escuro" title="Alternar tema claro e escuro">
        <span id="themeIcon">☀️</span>
      </button>
      <div class="hero-content">
        <div>
          <h1 id="hero-title" class="welcome-animated">Boas-vindas</h1>
          <p class="lead">
            Criei esse site para armazenar meus projetos tanto da faculdade quanto de outros trabalhos. Também utilizo o domínio para apresentações de projetos.
          </p>

          <div class="actions">
            <a class="button button-primary" href="./Projeto%20Atual/index.html">Ir para o projeto atual</a>
          </div>
        </div>

        <div class="welcome-panel" aria-label="Boas-vindas">
          <div class="bot" aria-hidden="true">
            <span class="bot-antenna"></span>
            <div class="bot-head">
              <div class="bot-eyes">
                <span class="bot-eye"></span>
                <span class="bot-eye"></span>
              </div>
              <span class="bot-mouth"></span>
            </div>
            <span class="bot-arm left"></span>
            <span class="bot-arm right"></span>
            <div class="bot-body"></div>
          </div>
        </div>
      </div>
      <div class="footer-note">
        <div class="footer-links">
          <a href="https://github.com/Alex12Rodrigues" target="_blank" rel="noopener noreferrer">Projetos no GitHub</a>
          <span aria-hidden="true">•</span>
          <a href="https://alex12rodrigues.infinityfree.me/" target="_blank" rel="noopener noreferrer">Meu site</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
